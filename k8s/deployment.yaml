apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-dashboard
  labels:
    app: churn-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: churn-dashboard
  template:
    metadata:
      labels:
        app: churn-dashboard
    spec:
      containers:
      - name: churn-app
        image: churn-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8501
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 45
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
