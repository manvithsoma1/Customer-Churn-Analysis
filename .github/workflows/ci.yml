name: Churn Pipeline CI/CD

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '*.md'
      - 'reports/**'
      - 'notebooks/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements-ci.txt

      - name: DVC Pull Data
        run: |
          if [ -z "${{ secrets.DAGSHUB_TOKEN }}" ]; then
            echo "DAGSHUB_TOKEN not set - skipping DVC pull."
          else
            dvc remote modify origin --local auth basic
            dvc remote modify origin --local user ${{ github.repository_owner }}
            dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}
            dvc pull --force || echo "DVC pull failed - continuing with committed artifacts."
          fi

      - name: Smoke test artifacts
        run: |
          test -f model.pkl || (echo "model.pkl missing" && exit 1)
          test -f feature_cols.json || (echo "feature_cols.json missing" && exit 1)
          test -f WA_Fn-UseC_-Telco-Customer-Churn.csv || (echo "dataset missing" && exit 1)

      - name: Sanity check imports
        run: |
          python -c "import pandas, sklearn, joblib, json; print('Imports working')"

  build-and-push:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    env:
      DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python & DVC
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          
      - name: Install DVC
        run: pip install dvc dvc-s3

      - name: Pull data from DVC
        run: |
          if [ -n "${{ secrets.DAGSHUB_TOKEN }}" ]; then
            dvc remote modify origin --local auth basic
            dvc remote modify origin --local user ${{ github.repository_owner }}
            dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}
            dvc pull || echo "DVC Pull Failed"
          fi

      - name: Build Docker Image
        run: docker build -t churn-app:${{ github.sha }} .

      - name: Test Docker Container
        run: |
          docker run -d -p 8501:8501 --name churn-test churn-app:${{ github.sha }}
          sleep 20
          curl -f http://localhost:8501/_stcore/health || exit 1

      - name: Login to Docker Hub
        if: env.DOCKER_USER != ''
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        if: env.DOCKER_USER != ''
        continue-on-error: true
        run: |
          docker tag churn-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/churn-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-app:latest
          docker tag churn-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/churn-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-app:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    env:
      KUBE_CONF: ${{ secrets.KUBECONFIG }}
    steps:
      - name: Checkout code
        if: env.KUBE_CONF != ''
        uses: actions/checkout@v4

      - name: Deploy to Kubernetes
        if: env.KUBE_CONF != ''
        continue-on-error: true
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
          export KUBECONFIG=$(pwd)/kubeconfig.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deployment churn-dashboard
          rm -f kubeconfig.yaml

      - name: Skip Deploy
        if: env.KUBE_CONF == ''
        run: echo "Skipping deployment - KUBECONFIG secret not found. Run locally using kind."
