name: Churn Pipeline CI/CD

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '*.md'
      - 'reports/**'
      - 'notebooks/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies (app and DVC)
        run: pip install --no-cache-dir -r requirements-ci.txt

      - name: Pull data from DVC (DagsHub)
        run: |
          if [ -z "${{ secrets.DAGSHUB_TOKEN }}" ]; then
            echo "DAGSHUB_TOKEN not set - skipping DVC pull."
            echo "Using artifacts already committed in the repo."
          else
            echo "Configuring DVC remote credentials..."
            dvc remote modify origin --local auth basic
            dvc remote modify origin --local user ${{ github.repository_owner }}
            dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}
            echo "Pulling data from DagsHub..."
            dvc pull --force || echo "DVC pull failed - using committed artifacts."
          fi

      - name: Smoke test verify model artifacts exist
        run: |
          echo "Checking required artifacts..."
          test -f model.pkl        && echo "model.pkl found"        || (echo "model.pkl missing" && exit 1)
          test -f scaler.pkl       && echo "scaler.pkl found"       || (echo "scaler.pkl missing" && exit 1)
          test -f kmeans.pkl       && echo "kmeans.pkl found"       || (echo "kmeans.pkl missing" && exit 1)
          test -f feature_cols.json && echo "feature_cols.json found" || (echo "feature_cols.json missing" && exit 1)
          test -f WA_Fn-UseC_-Telco-Customer-Churn.csv && echo "dataset found" || (echo "dataset missing" && exit 1)
          echo "All artifacts present"

      - name: Quick sanity test Python imports work
        run: |
          python -c "
          import pandas, numpy, sklearn, joblib, json
          model = joblib.load('model.pkl')
          print('Model loaded successfully')
          cols = json.load(open('feature_cols.json'))
          print(f'Features: {len(cols)} columns')
          "

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies (app and DVC)
        run: pip install --no-cache-dir -r requirements-ci.txt

      - name: Pull data from DVC (DagsHub)
        run: |
          if [ -z "${{ secrets.DAGSHUB_TOKEN }}" ]; then
            echo "DAGSHUB_TOKEN not set - using committed artifacts."
          else
            dvc remote modify origin --local auth basic
            dvc remote modify origin --local user ${{ github.repository_owner }}
            dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}
            dvc pull --force || echo "DVC pull failed - using committed artifacts."
          fi

      - name: Build Docker image
        run: docker build -t churn-app:${{ github.sha }} .

      - name: Docker smoke test
        run: |
          docker run -d --name churn-test -p 8501:8501 churn-app:${{ github.sha }}
          echo "Waiting for Streamlit to start..."
          sleep 25
          curl --fail http://localhost:8501/_stcore/health || (docker logs churn-test && exit 1)
          echo "Health check passed"
          docker stop churn-test
          docker rm churn-test

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' }}
        run: |
          docker tag churn-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/churn-app:latest
          docker tag churn-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/churn-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-app:${{ github.sha }}

      - name: Skip Docker Hub push
        if: ${{ secrets.DOCKER_USERNAME == '' }}
        run: echo "Skipping Docker Hub push - DOCKER_USERNAME secret not configured."

      - name: Deploy to Kubernetes
        if: ${{ secrets.KUBECONFIG != '' }}
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
          export KUBECONFIG=$(pwd)/kubeconfig.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deployment churn-dashboard
          rm -f kubeconfig.yaml

      - name: Skip K8s deploy
        if: ${{ secrets.KUBECONFIG == '' }}
        run: echo "Skipping K8s deploy - deploy locally with Kind instead."
