name: Churn Pipeline CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Configure DVC remote credentials
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ github.repository_owner }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Pull data and models from DVC (DagsHub)
        run: dvc pull

      - name: Validate DVC pipeline (reproduce if needed)
        run: dvc repro --dry

      - name: Smoke test — verify model artifacts exist
        run: |
          echo "Checking required artifacts..."
          test -f model.pkl       && echo "✅ model.pkl"       || (echo "❌ model.pkl missing" && exit 1)
          test -f scaler.pkl      && echo "✅ scaler.pkl"      || (echo "❌ scaler.pkl missing" && exit 1)
          test -f kmeans.pkl      && echo "✅ kmeans.pkl"      || (echo "❌ kmeans.pkl missing" && exit 1)
          test -f feature_cols.json && echo "✅ feature_cols.json" || (echo "❌ feature_cols.json missing" && exit 1)
          echo "All artifacts present ✅"

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    env:
      HAS_KUBECONFIG: ${{ secrets.KUBECONFIG != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Configure DVC remote credentials
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ github.repository_owner }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Pull data and models from DVC
        run: dvc pull

      - name: Build Docker image
        run: docker build -t churn-app:${{ github.sha }} .

      - name: Docker smoke test
        run: |
          docker run -d --name churn-test -p 8501:8501 churn-app:${{ github.sha }}
          echo "Waiting for Streamlit to start..."
          sleep 20
          curl --fail http://localhost:8501/_stcore/health || (docker logs churn-test && exit 1)
          echo "✅ Health check passed"
          docker stop churn-test
          docker rm churn-test

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push to Docker Hub
        run: |
          docker tag churn-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/churn-app:latest
          docker tag churn-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/churn-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/churn-app:${{ github.sha }}

      - name: Set up kubectl
        if: env.HAS_KUBECONFIG == 'true'
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Deploy to Kubernetes
        if: env.HAS_KUBECONFIG == 'true'
        continue-on-error: true
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
          export KUBECONFIG=$(pwd)/kubeconfig.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deployment churn-dashboard
          rm -f kubeconfig.yaml

      - name: Skip K8s deploy (no KUBECONFIG)
        if: env.HAS_KUBECONFIG != 'true'
        run: echo "⏭️ Skipping K8s deploy — KUBECONFIG secret not configured. Deploy locally with Kind."
